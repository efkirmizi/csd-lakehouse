# =============================================================================
#  Spark taban konfigurasyonu
# =============================================================================
#  TASARIM KARARI: Katalog ve kimlik bilgileri BU DOSYADA DEGIL.
#  Onlar jobs/common/session.py icinde ortam degiskenlerinden okunarak
#  programatik kuruluyor. Gerekce:
#    - spark-defaults.conf ortam degiskeni genisletemez ($VAR calismaz),
#      dolayisiyla parola yazmak icin tek yol hardcode etmek olurdu.
#    - Kimlik bilgisi imaja/repoya gomulmemeli (CSD guvenlik gereksinimi).
#  Burada sadece ortama gore degismeyen, sirsiz ayarlar var.
# =============================================================================

spark.master                                     spark://spark-master:7077

# --- Adaptive Query Execution ---
# Lakehouse'ta dosya boyutlari heterojen olur; AQE runtime'da partition
# sayisini yeniden hesaplar ve skew join'leri boler. Iceberg ile birlikte
# en yuksek getirili tek ayar budur.
spark.sql.adaptive.enabled                       true
spark.sql.adaptive.coalescePartitions.enabled    true
spark.sql.adaptive.skewJoin.enabled              true
spark.sql.adaptive.advisoryPartitionSizeInBytes  134217728

# --- Shuffle / paralellik ---
# Lokal demo icin 200 (varsayilan) fazla parcalanmaya yol aciyor.
spark.sql.shuffle.partitions                     32
spark.default.parallelism                        32

# --- Iceberg okuma tarafi ---
spark.sql.iceberg.vectorization.enabled          true
spark.sql.iceberg.handle-timestamp-without-timezone true

# --- Parquet yazma tarafi ---
spark.sql.parquet.compression.codec              zstd
spark.sql.parquet.filterPushdown                 true

# --- Kaynaklar (lokal makine profili; CSD sunucusunda buyutun) ---
spark.driver.memory                              2g
spark.executor.memory                            3g
spark.executor.cores                             2

# --- Serialization ---
spark.serializer                                 org.apache.spark.serializer.KryoSerializer

# --- S3A fallback (S3FileIO birincil yol; bazi araclar yine de s3a bekler) ---
spark.hadoop.fs.s3a.impl                         org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.path.style.access            true
spark.hadoop.fs.s3a.connection.ssl.enabled       false
spark.hadoop.fs.s3a.aws.credentials.provider     org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# --- UI ---
spark.ui.showConsoleProgress                     true
