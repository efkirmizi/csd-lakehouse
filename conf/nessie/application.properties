# =============================================================================
#  Nessie Katalog Sunucusu konfigurasyonu
# =============================================================================
#  NEDEN DOSYA, NEDEN ENV DEGISKENI DEGIL?
#
#  Nessie'nin S3 kimlik bilgileri bir "secret referansi" uzerinden verilir:
#      nessie.catalog.service.s3.default-options.access-key
#          = urn:nessie-secret:quarkus:<secret-yolu>
#      <secret-yolu>.name   = <access key id>
#      <secret-yolu>.secret = <secret access key>
#
#  Bu yolu ORTAM DEGISKENIYLE vermek calismaz. Quarkus, ortam degiskeni
#  adindaki alt cizgileri geri cevirirken TIRE mi NOKTA mi oldugunu
#  bilemez:
#      NESSIE_CATALOG_SECRETS_ACCESS_KEY_NAME
#        -> nessie.catalog.secrets.access-key.name   ?
#        -> nessie.catalog.secrets.access.key.name   ?
#  Bilinen (sema tanimli) property'lerde Quarkus bunu cozer; ancak secret
#  yolu KULLANICININ SECTIGI serbest bir yoldur, semasi yoktur. Sonuc:
#  deger sessizce baglanmaz ve tablo okurken su hatayi alirsiniz:
#      IllegalArgumentException: Missing access key and secret
#      for STATIC authentication mode
#  Belirti sinsidir: Nessie namespace/tablo LISTELER, sadece metadata
#  OKUYAMAZ. ClickHouse'ta bu "SHOW TABLES bos donuyor ama hata da yok"
#  seklinde gorunur.
#
#  Property dosyasinda ad birebir yazildigi icin belirsizlik kalmaz.
# =============================================================================

# ---- Warehouse tanimi ----
nessie.catalog.default-warehouse=warehouse
nessie.catalog.warehouses.warehouse.location=s3://lakehouse/warehouse

# ---- S3 baglanti ayarlari (MinIO) ----
nessie.catalog.service.s3.default-options.region=us-east-1
nessie.catalog.service.s3.default-options.endpoint=http://minio:9000
# MinIO path-style adresleme kullanir (host/bucket), virtual-host degil
nessie.catalog.service.s3.default-options.path-style-access=true
nessie.catalog.service.s3.default-options.auth-type=STATIC

# ---- Kimlik bilgisi: secret referansi ----
# Secret yolu 'nessie.*' ALTINDA OLAMAZ. Quarkus, nessie.* kokundeki
# bilinmeyen property'leri acilista reddeder:
#     SRCFG00050: nessie.catalog.secrets.<x>.name does not map to any root
# Secret'lar serbest (semasiz) bir kokte tutulmali; 'secrets.*' kullaniyoruz.
nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:secrets.miniocreds
secrets.miniocreds.name=minioadmin
secrets.miniocreds.secret=minioadmin123

# =============================================================================
#  URETIM NOTU
#  Bu dosyada duz metin parola var. Uretimde Nessie'nin harici secret
#  yoneticisi desteklerinden birini kullanin -- imaj icinde vault,
#  amazon-sdk-secretsmanager, azure-keyvault-secret ve
#  google-cloud-secret-manager eklentileri HAZIR geliyor:
#      nessie.secrets.type=VAULT
#      nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:vault:secret/minio
# =============================================================================
